<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Declaration Page</title>
    <style>
        body {
            background-color: purple;
            color: white;
            font-family: Arial, sans-serif;
        }
        .container {
            margin: 0 auto;
            padding: 20px;
            width: 80%;
            background-color: orange;
            border-radius: 10px;
        }
        textarea {
            width: 100%;
            height: 200px;
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
        }
        input[type='file'] {
            margin: 10px 0;
        }
        button {
            background-color: white;
            color: purple;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: lightgray;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Write and Edit Your Declaration</h1>
        <textarea placeholder="Write your declaration here..."></textarea>
        <h2>Add Photos and Videos</h2>
        <input type="file" accept="image/*" multiple>
        <input type="file" accept="video/*">
        <br>
        <button>Submit Declaration</button>
    </div>
</body>
</html>
