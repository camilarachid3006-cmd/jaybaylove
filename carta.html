<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Letter</title>
    <style>
        body {
            background-color: orange;
            color: purple;
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 300px;
            background-color: #f2f2f2;
            color: purple;
            border: 1px solid purple;
            padding: 10px;
        }
        button {
            background-color: purple;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        button:hover {
            background-color: #6a1b9a;
        }
    </style>
</head>
<body>
    <h1>Edit Your Letter</h1>
    <form>
        <textarea placeholder="Write your letter here..."></textarea>
        <br>
        <button type="submit">Save Letter</button>
    </form>
</body>
</html>
